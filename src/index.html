<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Title</title>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

<t>Introduce tu <b>GitHub User</b></t>
<div class="form-floating mb-3 mt-3">
    <input type="text" class="form-control" id="githubUser" placeholder="Enter GitHub User">
    <label for="githubUser">GitHub User</label>
</div>

<button id="btnBuscar" class="btn btn-primary">
    Buscar
</button>



<div class="container mt-3">
    <h2 id="titulo"> </h2>
    <table class="table table-dark table-striped">
        <thead>
        <tr>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>ID</th>
        </tr>
        </thead>
        <tbody id="RepoBody"></tbody>
    </table>
</div>

<script>
    const boton = document.getElementById("btnBuscar");
    const RepoBody = document.getElementById("RepoBody");
    boton.addEventListener("click", async function () {
        const User = document.getElementById("githubUser").value;

        const UsuarioTitulo = document.getElementById("titulo");
        UsuarioTitulo.textContent = "Información sobre los repositorios de " + User;
        if (!User) {
            UsuarioTitulo.textContent = "No se encontrado en el usuario";
            return;
        }
        const [userResponse, reposResponse, followersResponse] = await Promise.all([
            fetch("https://api.github.com/users/" + encodeURIComponent(User)),
            fetch("https://api.github.com/users/" + encodeURIComponent(User) + "/repos?per_page=100&sort=updated"),
            fetch("")
        ]);
        const usuario = await userResponse.json();
        const DatosRepos = await reposResponse.json();

        RepoBody.innerHTML = DatosRepos.map(function(repo) {
            const description = repo.description ? repo.description : "Sin descripción";
            return "<tr>" +
                "<td>" + repo.name + "</td>" +
                "<td>" + repo.description + "</td>" +
                "<td>" + repo.id+"</td>"

                "</tr>";
        }).join("");


    });
</script>

</body>
</html>
