<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Title</title>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

<t>Introduce tu <b>GitHub User</b></t>
<div class="form-floating mb-3 mt-3">
    <input type="text" class="form-control" id="githubUser" placeholder="Enter GitHub User">
    <label for="githubUser">GitHub User</label>
</div>

<button id="btnBuscar" class="btn btn-primary">
    Buscar
</button>



<div class="container mt-3">
    <h2 id="titulo"> </h2>
    <table class="table table-dark table-striped">
        <thead>
        <tr>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>Followers</th>
        </tr>
        </thead>


    </table>
</div>

<script>
    const boton = document.getElementById("btnBuscar");
    boton.addEventListener("click", function() {
        const User = document.getElementById("githubUser").value;

        const UsuarioTitulo = document.getElementById("titulo");
        UsuarioTitulo.textContent= "Información sobre los repositorios de " + User;



    });
</script>

</body>
</html>
