<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <title>Title</title>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>
<body>

<t>Introduce tu <b>GitHub User</b></t>
<div class="form-floating mb-3 mt-3">
    <input type="text" class="form-control" id="githubUser" placeholder="Enter GitHub User">
    <label for="githubUser">GitHub User</label>
</div>

<button id="btnBuscar" class="btn btn-primary">
    Buscar
</button>

<script>
    const boton = document.getElementById('btnBuscar');
    console.log("Botón:", boton);

    boton.addEventListener("click", function(){
        const input = document.getElementById('githubUser');
        console.log("Input:", input);

        const usuario = input.value;
        console.log(usuario);
    });
</script>



</body>
</html>
